# Fallback flat list, used only if `audiences` below is empty.
subreddits:
  - personalfinance
  - legaladvice
  - EstatePlanning

# Client product website. `npm run scrape` crawls this and distills a product
# knowledge base into catalogPath, which the analyzer uses to tailor comments.
site:
  baseUrl: https://www.planningforms.com
  maxPages: 40
  catalogPath: data/products.json
  # Brand name, used only when ai.promotionLevel is "soft_brand".
  brandName: Planning Forms

# Audience groups: which subreddits map to which audience.
# 9 groups, ~100 subreddits. runtime.maxSubredditsPerSession (20) caps how many
# are visited per session — the list is shuffled so all rotate over time.
