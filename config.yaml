# =============================================================================
# Reddit Comment Bot - configuration
# Edit this file to change behavior WITHOUT touching the code.
# =============================================================================

# --- Which subreddits to scan ---
subreddits:
  - personalfinance
  - legaladvice
  - EstatePlanning

# --- Post discovery ---
discovery:
  # Fallback sort tab if rotation is empty: "new" | "hot" | "rising"
  sort: new
  # A sort is picked RANDOMLY from this list per subreddit each run (looks
  # less robotic). Set to [] to always use `sort` above.
  sort_rotation:
    - new
    - hot
    - rising
  # Shuffle the order subreddits are scanned each run.
  shuffle_subreddits: true
  # How many recent posts to fetch from each subreddit per run
  posts_per_subreddit: 15
  # Skip posts older than this (hours). Engaging on stale posts looks bot-like.
  max_age_hours: 12
  # Skip posts younger than this (minutes). Brand new posts often get removed.
  min_age_minutes: 15
  # Skip posts shorter than this (characters in the body). Low-context posts -> bad replies.
  min_body_chars: 200
  # When true: open each subreddit in the visible browser and SCROLL it
  # before fetching posts, so you can watch the bot working. Slower.
  visual_mode: true
  # Extra: also open each candidate post in the browser ("reading" it).
  # Only takes effect if visual_mode: true. Even slower.
  visual_open_posts: false

  # Post title+body must contain at least one keyword (case-insensitive).
  # Applies to all subreddits — keeps comments estate / inheritance focused.
  keywords:
    - will
    - estate
    - probate
    - inheritance
    - trust
    - executor
    - beneficiary
    - heir
    - testament
    - power of attorney
    - living will
    - intestate
    - bequest
    - fiduciary

# --- AI behavior ---
ai:
  # Minimum relevance score (0-10) for a post to be commented on.
  min_relevance_score: 8
  # Hard caps on the generated comment - keep short & punchy
  min_comment_chars: 80
  max_comment_chars: 280
  # Persona / tone the AI should write in. Edit this freely.
  persona: |
    You are a thoughtful, helpful Redditor with real-world experience in
    estate planning, wills, probate, trusts, and inheritance (including how
    those topics show up in personal finance and basic legal questions).
    You write like a human: lowercase is fine, contractions ok, no emojis,
    no markdown headers, no corporate tone. Give specific, practical advice
    tied to the post. You NEVER mention being an AI. You NEVER promote
    anything. You NEVER include URLs or product names. If unsure, say so and
    suggest talking to an estate attorney for state-specific rules.

# --- Posting behavior (SAFETY CRITICAL) ---
posting:
  # If true, the bot will only DRAFT comments and log them - it will NOT post.
  dry_run: false
  # Max comments per 24h. Set to 0 for no limit (only min_gap + jitter apply).
  daily_cap: 0
  # Base gap between comments is RANDOM in this range (minutes) - not fixed.
  # Each cycle the bot picks a fresh value between these two numbers.
  min_gap_min_minutes: 150
  min_gap_max_minutes: 320
  # Extra random delay added ON TOP of the base gap (minutes).
  jitter_minutes: 60
  # Simulated typing speed (chars per second). Range. ~3-6 = realistic.
  typing_cps_min: 3
  typing_cps_max: 6
  # true  = post comments on old.reddit.com (reliable, slight bot tell)
  # false = post on www.reddit.com (more human, can break if Reddit changes UI)
  use_old_reddit: true
  # If new-reddit posting fails, automatically retry on old.reddit
  fallback_to_old_reddit: true

# --- Humanize: make the whole session look like a real person ---
humanize:
  # Master switch for all the behaviors below.
  enabled: true

  # At session start, casually browse 1-2 unrelated subreddits (lurking),
  # so the account isn't "only ever commenting in 3 niche subs".
  lurk_probability: 0.6
  lurk_subreddits:
    - news
    - todayilearned
    - mildlyinteresting
    - AskReddit
  lurk_min: 1
  lurk_max: 2

  # While reading a post/feed, sometimes upvote something (real users vote).
  upvote_probability: 0.45

  # Even when a draft is good, occasionally just read and move on (don't
  # comment on EVERY good post - humans don't).
  skip_good_post_probability: 0.15

  # Random chance the whole run does nothing today (humans aren't daily-robots).
  skip_day_probability: 0.15

  # Only operate between these local hours [start, end). [] = any time.
  active_hours: [8, 23]

  # Never comment in the same subreddit twice within this many minutes.
  per_subreddit_cooldown_minutes: 360

# --- Browser ---
browser:
  # Set false the first time you log in, so YOU can solve any captcha.
  # After login, the session is saved and headless: true works.
  headless: false
  # Where the persistent browser profile is stored (cookies, login).
  user_data_dir: data/browser_profile
  # User agent. Leave default unless you know what you're doing.
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.0.0 Safari/537.36"

# --- Runtime ---
runtime:
  # Path to the sqlite db that tracks which posts we've already seen/replied to.
  db_path: data/state.db
  # Log file path
  log_path: logs/bot.log
