discovery:
  sortRotation:
    - new
    - hot
    - rising
  shuffleSubreddits: true
  postsPerSubreddit: 15
  maxAgeHours: 12
  minAgeMinutes: 15
  minBodyChars: 140
  keywords:
    - will
    - estate
    - probate
    - inheritance
    - trust
    - executor
    - beneficiary
    - heir
    - testament
    - power of attorney
    - living will
    - intestate
    - bequest
    - fiduciary

ai:
  model: gpt-4.1-mini
  minRelevanceScore: 8
  minCommentChars: 90
  maxCommentChars: 280
  # Reject drafts the model self-rates below this (0-10) as filler/low-value.
  minQuality: 6
  # Weight on buying-intent when ranking which drafts to post first.
  intentWeight: 1
  # Promotion stance: off | topical | soft_brand
  # NOTE: when the ramp is enabled, the active stage's promotionLevel overrides
  # this per run (young accounts stay topical; mature accounts may soft_brand).
  #   off        — pure help, no product steering
  #   topical    — steer toward the product's subject area, never a brand/URL (default, safest)
  #   soft_brand — topical, may occasionally name the brand (set site.brandName), still no URL
  promotionLevel: topical
  # Live web search before drafting, so replies are grounded in current facts.
  # Costs an extra API call per post and uses a search-enabled model.
  liveSearch: false
  searchModel: gpt-4o-search-preview
  persona: |
    You are a thoughtful Redditor who gives practical, plain-English guidance
    about estate planning, wills, probate, trusts, inheritance, and adjacent
    personal-finance or basic legal questions. You sound human, concise, and
    specific to the post. You never mention being an AI and never include URLs.

# 24/7 randomized operation (used with `--loop`). Gaps between sessions are
# randomized so activity never looks scheduled; occasional long breaks too.
daemon:
  sessionGapMinMinutes: 40
  sessionGapMaxMinutes: 210
  longBreakProbability: 0.15
  longBreakMinHours: 3
  longBreakMaxHours: 9

# Account-maturity ramp. Each run the bot reads the account's age + karma and
# auto-selects the most advanced stage it qualifies for (needs BOTH thresholds).
# A new account stays in "warmup" (draft-only, mostly lurking) and activity
# scales up automatically as the account ages and earns karma. Set once; the bot
# decides the rest. Set enabled:false to ignore the ramp and use posting/* + CLI.
ramp:
  enabled: true
  stages:
    - { name: warmup,      minAccountDays: 0,   minKarma: 0,    posting: false, dailyCap: 0, minGapMinutes: 360, maxGapMinutes: 600, lurkProbability: 0.85, upvoteProbability: 0.45, promotionLevel: topical,    weeklyPostCap: 0 }
    # minKarma lowered to 0 so the current account (205d old, low karma) enters
    # cautious now and starts building karma + age. Entry is age-gated (21d+).
    - { name: cautious,    minAccountDays: 21,  minKarma: 0,    posting: true,  dailyCap: 1, minGapMinutes: 300, maxGapMinutes: 540, lurkProbability: 0.75, upvoteProbability: 0.40, promotionLevel: topical,    weeklyPostCap: 1 }
    - { name: steady,      minAccountDays: 45,  minKarma: 500,  posting: true,  dailyCap: 2, minGapMinutes: 240, maxGapMinutes: 420, lurkProbability: 0.60, upvoteProbability: 0.35, promotionLevel: topical,    weeklyPostCap: 2 }
    - { name: active,      minAccountDays: 90,  minKarma: 2000, posting: true,  dailyCap: 3, minGapMinutes: 180, maxGapMinutes: 360, lurkProbability: 0.50, upvoteProbability: 0.30, promotionLevel: soft_brand, weeklyPostCap: 3 }
    - { name: established, minAccountDays: 180, minKarma: 5000, posting: true,  dailyCap: 4, minGapMinutes: 150, maxGapMinutes: 300, lurkProbability: 0.40, upvoteProbability: 0.25, promotionLevel: soft_brand, weeklyPostCap: 4 }

# Original posts created by this account (separate from comment caps).
# Each post is an original Reddit thread — story, educational, discussion, or
# checklist — written to add genuine value and build account authority.
# The ramp's weeklyPostCap overrides the value below per stage.
postCreation:
  enabled: true
  subreddits:
    - EstatePlanning
    - personalfinance
    - AgingParents
    - retirement
    - financialindependence
    - Bogleheads
    - CaregiverSupport
    - legaladvice
    - GriefSupport
    - Parenting
    - Veterans
    - smallbusiness
    - divorce
    - ChronicIllness
    - homeowners
  postTypes: [story, educational, discussion, checklist]
  # Don't post to the same subreddit twice within this window.
  subredditCooldownDays: 14
  weeklyPostCap: 1
  minBodyChars: 150
  maxBodyChars: 600

posting:
  enabled: false
  dailyCap: 1
  minGapMinutes: 180
  maxGapMinutes: 360
  jitterMinutes: 45
  useOldReddit: true
  fallbackToOldReddit: true
  typingCharsPerSecondMin: 3
  typingCharsPerSecondMax: 6

humanize:
  enabled: true
  lurkProbability: 0.6
  lurkSubreddits:
    - news
    - todayilearned
    - mildlyinteresting
    - AskReddit
  lurkMin: 1
  lurkMax: 2
  upvoteProbability: 0.35
  skipGoodPostProbability: 0.15
  skipRunProbability: 0.1
  activeHours: [8, 23]
  perSubredditCooldownMinutes: 360

browser:
  headless: false
  userDataDir: data/browser-profile
  # Drive the real installed Google Chrome for an authentic fingerprint.
  # Set to "" to fall back to Playwright's bundled Chromium.
  channel: chrome
  # Leave userAgent unset so Chrome sends its own real UA. Overriding it with a
  # value that doesn't match the channel/OS is itself a bot tell.
  locale: en-US
  timezoneId: America/New_York

runtime:
  databasePath: data/state.db
  maxAnalyzePerRun: 25
  # Visit 20 random subreddits per session from the full ~100 pool.
  # Full rotation happens over ~5 sessions (every few hours).
  maxSubredditsPerSession: 20

# Self-protection: re-check recently posted comments and back off to draft-only
# if Reddit is removing too many (a sign the account is too new / low-karma).
recheck:
  enabled: true
  maxPerRun: 5
  withinDays: 7
  removalRateThreshold: 0.34
  minSample: 3
